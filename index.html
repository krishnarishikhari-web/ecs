// ── PASSWORD HASHING (SHA-256 via SubtleCrypto — no plaintext storage) ────────
async function hashPassword(password){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest("SHA-256",enc.encode(password));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

function calcTotal(cart,promo){
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  let disc=0;
  if(promo){
    if(promo.type==="percent") disc=subtotal*promo.discount/100;
    else if(promo.type==="flat"&&subtotal>499) disc=promo.discount;
    else if(promo.type==="flat") disc=0;
  }
  const delivery=subtotal>499?0:40;
  return{subtotal,disc,delivery,total:Math.max(0,subtotal-disc)+delivery};
}

}

// ── REGISTER / LOGIN ──────────────────────────────────────────────────────────
function AuthModal({mode,onAuth,onClose,onSwitch}){
  const [f,setF]=useState({name:"",email:"",phone:"",address:"",city:"",pincode:"",password:""});
  const [err,setErr]=useState("");
  const upd=k=>e=>setF({...f,[k]:e.target.value});

  async function handleSubmit(){
    if(mode==="login"){
      const users=JSON.parse(localStorage.getItem("fm_users")||"[]");
      const pwHash=await hashPassword(f.password);
      const u=users.find(x=>x.email===f.email&&(x.passwordHash===pwHash||(x.password&&x.password===f.password)));
      if(!u){setErr("Invalid email or password");return;}
      onAuth(u);
    } else {
      if(!f.name||!f.email||!f.phone||!f.address||!f.city||!f.pincode||!f.password){setErr("All fields required");return;}
      if(!/\S+@\S+\.\S+/.test(f.email)){setErr("Invalid email");return;}
      if(f.phone.length<10){setErr("Invalid phone number");return;}
      const users=JSON.parse(localStorage.getItem("fm_users")||"[]");
      if(users.find(x=>x.email===f.email)){setErr("Email already registered");return;}
      const pwHash=await hashPassword(f.password);
      const newUser={...f,password:undefined,passwordHash:pwHash,id:genId(),role:"customer",orders:[]};
      users.push(newUser);
      localStorage.setItem("fm_users",JSON.stringify(users));
      onAuth(newUser);
    }
  }

  const fields=mode==="register"
    ?[["Name","name","text"],["Email","email","email"],["Phone","phone","tel"],["Address","address","text"],["City","city","text"],["Pincode","pincode","text"],["Password","password","password"]]
    :[["Email","email","email"],["Password","password","password"]];

  return(
    <div className="modal-overlay">
      <div className="modal fade-in" style={{position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🛒</div>
          <h2 style={{fontSize:22,color:"var(--gray-900)"}}>{mode==="register"?"Create Account":"Welcome Back"}</h2>
          <p style={{color:"var(--gray-400)",fontSize:13,marginTop:4}}>
            {mode==="register"?"Register to start shopping at FreshMart":"Sign in to your FreshMart account"}
          </p>
        </div>
        {err&&<div style={{background:"var(--red-light)",color:"var(--red)",borderRadius:"var(--radius-sm)",padding:"10px 14px",marginBottom:16,fontSize:13}}>{err}</div>}
        <div style={{display:"grid",gridTemplateColumns:mode==="register"?"1fr 1fr":"1fr",gap:12}}>
          {fields.map(([label,key,type])=>(
            <div key={key} style={key==="address"?{gridColumn:"1/-1"}:{}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>{label}</label>
              <input className="input-field" type={type} value={f[key]} onChange={upd(key)} placeholder={`Enter ${label.toLowerCase()}`}/>
            </div>
          ))}
        </div>
        <button className="btn-primary" onClick={handleSubmit} style={{width:"100%",marginTop:20,padding:"12px",fontSize:15}}>
          {mode==="register"?"Create Account & Continue":"Sign In"}
        </button>
        <p style={{textAlign:"center",marginTop:16,fontSize:13,color:"var(--gray-400)"}}>
          {mode==="register"?"Already have an account? ":"Don't have an account? "}
          <button onClick={onSwitch} style={{background:"none",border:"none",color:"var(--green)",fontWeight:600,cursor:"pointer",fontSize:13}}>
            {mode==="register"?"Sign In":"Register"}
          </button>
        </p>
        <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"var(--gray-100)",border:"none",borderRadius:"var(--radius-sm)",padding:"6px 10px",cursor:"pointer",color:"var(--gray-600)",fontSize:16}}>✕</button>
      </div>
    </div>
  );
}

function CartSidebar({cart,onInc,onDec,onRemove,onCheckout,onClose,promo,setPromo,promoInput,setPromoInput,user,onLogin}){
  const [promoErr,setPromoErr]=useState("");
  const {subtotal,disc,delivery,total}=calcTotal(cart,promo);

  function applyPromo(){
    const code=promoInput.trim().toUpperCase();
    if(PROMO_CODES[code]){
      if(PROMO_CODES[code].type==="flat"&&subtotal<=499){setPromoErr("Min order ₹500 for this code");return;}
      setPromo({...PROMO_CODES[code],code});setPromoErr("");
    } else setPromoErr("Invalid promo code");

  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex"}}>

// ── AI IMAGE ENHANCER ─────────────────────────────────────────────────────────
// Single-slot enhancer (used inside MultiImageUploader)
function AIImageUploaderSlot({value,onChange,slotIndex,label}){
  const [status,setStatus]=useState("idle");
  const [preview,setPreview]=useState(value&&value.startsWith("data:")?value:null);
  const [info,setInfo]=useState(null);
  const fileRef=useRef(null);
  // Sync preview when value prop changes externally
  useEffect(()=>{setPreview(value&&value.startsWith("data:")?value:value||null);},[value]);

  /* ── Lanczos-style 2× super-resolution upscale via stepped canvas ── */
  function upscaleCanvas(imgEl){
    const srcW=imgEl.naturalWidth||imgEl.width;
    const srcH=imgEl.naturalHeight||imgEl.height;
    // Target: upscale small images to at least 2000px on longest side
    const maxSide=Math.max(srcW,srcH);
    const scale=maxSide<2000?Math.ceil(2000/maxSide):1;
    const dstW=srcW*scale;
    const dstH=srcH*scale;
    // Stepped upscaling (50% per step) — avoids pixelation
    let c=document.createElement("canvas");
    let ctx=c.getContext("2d");
    c.width=srcW; c.height=srcH;
    ctx.drawImage(imgEl,0,0,srcW,srcH);
    if(scale>1){
      let cw=srcW, ch=srcH;
      while(cw<dstW){
        const nw=Math.min(cw*2,dstW), nh=Math.min(ch*2,dstH);
        const c2=document.createElement("canvas"); c2.width=nw; c2.height=nh;
        const ctx2=c2.getContext("2d");
        ctx2.imageSmoothingEnabled=true;
        ctx2.imageSmoothingQuality="high";
        ctx2.drawImage(c,0,0,nw,nh);
        c=c2; ctx=ctx2; cw=nw; ch=nh;
      }
    }
    return {canvas:c,w:dstW,h:dstH,origW:srcW,origH:srcH,scale};
  }

  /* ── Unsharp mask on raw pixel data ── */
  function unsharpMask(canvas,radius,amount){
    const W=canvas.width, H=canvas.height;
    const ctx=canvas.getContext("2d");
    const orig=ctx.getImageData(0,0,W,H);
    // Gaussian blur pass
    const blurC=document.createElement("canvas"); blurC.width=W; blurC.height=H;
    const blurCtx=blurC.getContext("2d");
    blurCtx.filter=`blur(${radius}px)`;
    blurCtx.drawImage(canvas,0,0);
    const blurred=blurCtx.getImageData(0,0,W,H);
    const sharpened=ctx.createImageData(W,H);
    const d=orig.data, b=blurred.data, s=sharpened.data;
    for(let i=0;i<d.length;i+=4){
      for(let c=0;c<3;c++){
        const diff=d[i+c]-b[i+c];
        s[i+c]=Math.max(0,Math.min(255,Math.round(d[i+c]+amount*diff)));
      }
      s[i+3]=d[i+3];
    }
    ctx.putImageData(sharpened,0,0);
    return canvas;
  }

  /* ── Tonal correction (levels + vibrance) in pixel data ── */
  function tonalCorrect(canvas,brightness,contrast,saturation){
    const W=canvas.width, H=canvas.height;
    const ctx=canvas.getContext("2d");
    const img=ctx.getImageData(0,0,W,H);
    const d=img.data;
    const con=(259*(contrast+255))/(255*(259-contrast));
    for(let i=0;i<d.length;i+=4){
      // Contrast
      let r=con*(d[i]  -128)+128+brightness;
      let g=con*(d[i+1]-128)+128+brightness;
      let b=con*(d[i+2]-128)+128+brightness;
      // Saturation via luminance
      const lum=0.299*r+0.587*g+0.114*b;
      r=Math.max(0,Math.min(255,lum+saturation*(r-lum)));
      g=Math.max(0,Math.min(255,lum+saturation*(g-lum)));
      b=Math.max(0,Math.min(255,lum+saturation*(b-lum)));
      d[i]=r; d[i+1]=g; d[i+2]=b;
    }
    ctx.putImageData(img,0,0);
    return canvas;
  }

  /* ── AI analysis via Claude ── */
  async function analyzeWithAI(b64,mimeType){
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:400,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mimeType,data:b64}},
            {type:"text",text:`Analyze this product image and return ONLY a JSON object with no markdown or extra text:
{"quality":"low|medium|high","brightness":"dark|normal|bright","saturation":"dull|normal|vivid","sharpness":"blurry|soft|sharp","issues":["list up to 3 issues"]}
Be precise. low quality = clearly pixelated/very blurry/heavy noise. medium = somewhat soft/minor issues. high = already crisp.`}
          ]}]
        })
      });
      const data=await resp.json();
      const txt=(data.content||[]).map(x=>x.text||"").join("");
      try{ return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
      catch{ return {quality:"medium",brightness:"normal",saturation:"normal",sharpness:"soft",issues:[]}; }
    }catch{ return {quality:"medium",brightness:"normal",saturation:"normal",sharpness:"soft",issues:[]}; }
  }

  async function handleFile(file){
    if(!file||!file.type.startsWith("image/")) return;
    setStatus("uploading");
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const dataUrl=e.target.result;
      const b64=dataUrl.split(",")[1];
      const mime=file.type;
      const sizeBefore=Math.round(file.size/1024);
      setStatus("enhancing");

      // Run AI analysis and image load in parallel
      const imgLoad=new Promise(res=>{
        const img=new Image(); img.onload=()=>res(img); img.src=dataUrl;
      });
      const [img,analysis]=await Promise.all([imgLoad, analyzeWithAI(b64,mime)]);

      // 1. Upscale
      const {canvas,w,h,origW,origH}=upscaleCanvas(img);

      // 2. Unsharp mask — aggressiveness based on AI sharpness rating
      const sharpAmount = analysis.sharpness==="blurry"?2.8 : analysis.sharpness==="soft"?1.8 : 1.0;
      const sharpRadius = analysis.sharpness==="blurry"?1.2 : 0.8;
      unsharpMask(canvas, sharpRadius, sharpAmount);

      // 3. Second sharpening pass for very blurry images
      if(analysis.sharpness==="blurry") unsharpMask(canvas, 0.6, 1.4);

      // 4. Tonal correction based on AI analysis
      const brightAdj = analysis.brightness==="dark"?18 : analysis.brightness==="bright"?-8 : 0;
      const contrastAdj = analysis.quality==="low"?22 : analysis.quality==="medium"?12 : 5;
      const satAdj = analysis.saturation==="dull"?1.25 : analysis.saturation==="vivid"?1.02 : 1.10;
      tonalCorrect(canvas, brightAdj, contrastAdj, satAdj);

      // 5. Export as lossless PNG for 100% quality — no compression artefacts
      const finalDataUrl=canvas.toDataURL("image/png");
      const sizeAfter=Math.round(finalDataUrl.length*0.75/1024);

      setInfo({w,h,origW,origH,quality:analysis.quality,issues:analysis.issues||[],sizeBefore,sizeAfter});
      setPreview(finalDataUrl);
      onChange(finalDataUrl);
      setStatus("done");
    };
    reader.readAsDataURL(file);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <div
        onClick={()=>status==="enhancing"?null:fileRef.current?.click()}
        onDragOver={e=>e.preventDefault()}
        onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}
        style={{border:`2px dashed ${status==="done"||preview?"var(--green)":"var(--gray-200)"}`,borderRadius:"var(--radius-sm)",textAlign:"center",cursor:status==="enhancing"?"wait":"pointer",background:preview?"#f0faf4":"var(--white)",transition:".2s",position:"relative",overflow:"hidden",height:110,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}
      >
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
        {status==="enhancing"&&(
          <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:2,gap:8}}>
            <div style={{width:28,height:28,border:"3px solid var(--green-light)",borderTop:"3px solid var(--green)",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
            <p style={{fontWeight:700,color:"var(--green)",fontSize:11}}>Enhancing…</p>
          </div>
        )}
        {preview?(
          <div style={{position:"relative",width:"100%",height:"100%"}}>
            <img src={preview} alt={`Product image ${slotIndex+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:6}}/>
            <button onClick={e=>{e.stopPropagation();onChange("");setPreview(null);setStatus("idle");setInfo(null);}}
              style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",cursor:"pointer",fontSize:13,lineHeight:"22px",textAlign:"center",zIndex:3}}>✕</button>
            {status==="done"&&<span style={{position:"absolute",bottom:4,left:4,background:"var(--green)",color:"#fff",borderRadius:10,padding:"2px 7px",fontSize:10,fontWeight:700}}>✨HD</span>}
          </div>
        ):(
          <>
            <div style={{fontSize:28}}>📷</div>
            <p style={{fontSize:11,color:"var(--gray-400)",fontWeight:600}}>{label||`Image ${slotIndex+1}`}</p>
            <p style={{fontSize:10,color:"var(--gray-400)"}}>Click or drop</p>
          </>
        )}
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ── MULTI-IMAGE UPLOADER ──────────────────────────────────────────────────────
function MultiImageUploader({images,onChange}){
  // images: array of up to 6 dataUrls
  const slots=6;
  const arr=[...images,...Array(Math.max(0,slots-images.length)).fill("")];
  function setSlot(i,url){
    const next=[...arr];
    next[i]=url;
    // Compact: remove empty strings from the middle, keep order, trim trailing empties
    // findLastIndex polyfill — not available in all browsers
    let lastFilled=-1;
    for(let k=next.length-1;k>=0;k--){if(next[k]){lastFilled=k;break;}}
    const compacted=next.filter((v,idx)=>v||(idx<lastFilled+1));
    onChange(compacted.filter(Boolean));
  }
  const slotLabels=["Main","View 2","View 3","View 4","View 5","View 6"];
  return(
    <div style={{gridColumn:"1/-1"}}>
      <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:8}}>
        Product Images (up to 6)
        <span style={{background:"var(--green-light)",color:"var(--green)",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,marginLeft:6}}>✨ AI HD Enhanced</span>

      </label>

        ))}

}

// ── ADMIN ORDER ROW ───────────────────────────────────────────────────────────

    onUpdate({...order,status,note});

        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
          <span className="badge badge-blue">{order.payment}</span>
          {order.promoCode&&<span className="badge badge-green" style={{fontSize:10}}>🎟 {order.promoCode}</span>}
        </div>
        <div style={{textAlign:"right"}}>
          <p style={{fontWeight:700,color:"var(--green)",fontSize:16}}>{fmtPrice(order.total)}</p>

      {expanded&&(
        <div style={{borderTop:"1px solid var(--gray-100)",padding:"12px 20px",background:"var(--gray-50)"}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--gray-600)",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Order Items</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
            {order.items.map(i=>(
              <span key={i.id} style={{background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-sm)",padding:"4px 10px",fontSize:12}}>
                {i.image} {i.name} ×{i.qty} — {fmtPrice(i.price*i.qty)}
              </span>
            ))}
          </div>
          <p style={{fontSize:12,color:"var(--gray-600)"}}>
            📍 {order.user.address}, {order.user.city} – {order.user.pincode}
          </p>
          {order.note&&<p style={{fontSize:12,color:"var(--amber)",marginTop:6}}>📝 Note: {order.note}</p>}
        </div>
      )}

      {/* Edit panel */}
      {editing&&(
        <div style={{borderTop:"2px solid var(--green)",padding:"16px 20px",background:"var(--green-light)"}}>
          <p style={{fontSize:13,fontWeight:700,color:"var(--green)",marginBottom:12}}>Edit Order #{order.id}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>Order Status</label>
              <select className="input-field" value={status} onChange={e=>setStatus(e.target.value)} style={{fontSize:13}}>
                {ORDER_STATUSES.map(s=><option key={s} value={s} style={{textTransform:"capitalize"}}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>Admin Note (optional)</label>
              <input className="input-field" value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a note…" style={{fontSize:13}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn-primary" onClick={save} style={{fontSize:13,padding:"8px 20px"}}>✓ Save Changes</button>
            <button className="btn-outline" onClick={()=>setEditing(false)} style={{fontSize:13,padding:"8px 16px"}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN USER ROW ────────────────────────────────────────────────────────────

          <div><label style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:2}}>Phone</label><input className="input-field" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} style={{fontSize:12}}/></div>

          <div><label style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:2}}>City</label><input className="input-field" value={f.city} onChange={e=>setF({...f,city:e.target.value})} style={{fontSize:12}}/></div>
          <div><label style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:2}}>Pincode</label><input className="input-field" value={f.pincode} onChange={e=>setF({...f,pincode:e.target.value})} style={{fontSize:12}}/></div>

      <td style={{padding:"10px 14px",fontWeight:600,fontSize:14}}>{user.name}</td>

      <td style={{padding:"10px 14px",fontSize:13}}>{user.phone||"—"}</td>
      <td style={{padding:"10px 14px",fontSize:13,color:"var(--gray-600)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.address||"—"}</td>
      <td style={{padding:"10px 14px",fontSize:13}}>{user.city||"—"}</td>
      <td style={{padding:"10px 14px",fontSize:13}}>{user.pincode||"—"}</td>

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel({products,setProducts,orders,setOrders,users,setUsers,onClose}){
  function updateOrder(updated){setOrders(prev=>prev.map(x=>x.id===updated.id?updated:x));}
  function deleteOrder(id){setOrders(prev=>prev.filter(x=>x.id!==id));}
  function updateUser(updated){setUsers(prev=>prev.map(x=>x.id===updated.id?updated:x));}
  function deleteUser(id){setUsers(prev=>prev.filter(x=>x.id!==id));}
  const [tab,setTab]=useState("products");
  const [editingProduct,setEditingProduct]=useState(null);
  const [newProduct,setNewProduct]=useState({name:"",category:CATEGORIES[1],price:"",unit:"",images:[],image:"🛒",stock:"",description:"",featured:false,offerPercent:"",offerLabel:"",features:[]});
  const [featureInput,setFeatureInput]=useState("");

  function saveProduct(){
    if(!newProduct.name||!newProduct.price||!newProduct.unit||!newProduct.stock){return;}
    // Build strictly-typed fields — never spread raw form state to avoid string price crashing fmtPrice
    const productData={
      name:newProduct.name,
      category:newProduct.category,
      description:newProduct.description||"",
      unit:newProduct.unit,
      image:newProduct.image||"🛒",
      price:+newProduct.price,
      stock:+newProduct.stock,
      featured:!!newProduct.featured,
      offerPercent:(newProduct.offerPercent&&!isNaN(+newProduct.offerPercent)&&+newProduct.offerPercent>0)?+newProduct.offerPercent:0,
      offerLabel:newProduct.offerLabel||"",
      images:newProduct.images||[],
      imageUrl:(newProduct.images&&newProduct.images[0])?newProduct.images[0]:(newProduct.imageUrl||""),
      features:newProduct.features||[],
    };
    if(editingProduct){
      // Use functional updater to get latest state; merge onto live `p`, not stale editingProduct
      setProducts(prev=>prev.map(p=>p.id===editingProduct.id?{...p,...productData}:p));
    } else {
      setProducts(prev=>[...prev,{...productData,id:Date.now()}]);
    }
    setEditingProduct(null);
    setNewProduct({name:"",category:CATEGORIES[1],price:"",unit:"",images:[],image:"🛒",stock:"",description:"",featured:false,offerPercent:"",offerLabel:"",features:[]});
    setFeatureInput("");
    setTab("products");
  }
  function startEdit(p){
    setEditingProduct(p);
    setNewProduct({...p,price:String(p.price),stock:String(p.stock),images:p.images||[],imageUrl:p.imageUrl||"",offerPercent:String(p.offerPercent||""),offerLabel:p.offerLabel||"",features:p.features||[]});
    setFeatureInput("");
    setTab("add");
  }
  function deleteProduct(id){setProducts(prev=>prev.filter(p=>p.id!==id));}
  function toggleFeatured(id){setProducts(prev=>prev.map(p=>p.id===id?{...p,featured:!p.featured}:p));}

  const totalRevenue=orders.reduce((s,o)=>s+o.total,0);

  const tabs=[{id:"products",label:"Products"},
    {id:"add",label:editingProduct?"Edit Product":"Add Product"},
    {id:"orders",label:"Orders"},
    {id:"users",label:"Users"},
    {id:"stats",label:"Dashboard"}];

  return(
    <div style={{position:"fixed",inset:0,background:"var(--gray-50)",zIndex:800,overflow:"auto"}}>
      <div style={{background:"var(--green)",padding:"16px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:24}}>🛒</span>
          <div>
            <h2 style={{color:"#fff",fontSize:18,fontFamily:"var(--font-display)"}}>FreshMart Admin</h2>
            <p style={{color:"rgba(255,255,255,.7)",fontSize:12}}>Store Management Console</p>
          </div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"var(--radius-sm)",padding:"8px 16px",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}}>← Back to Store</button>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid var(--gray-200)",background:"var(--white)",padding:"0 24px",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id!=="add")setEditingProduct(null);}} style={{padding:"14px 20px",border:"none",background:"none",fontWeight:600,fontSize:14,color:tab===t.id?"var(--green)":"var(--gray-400)",borderBottom:tab===t.id?"2.5px solid var(--green)":"2.5px solid transparent",cursor:"pointer",whiteSpace:"nowrap"}}>{t.label}</button>
        ))}
      </div>
      <div style={{padding:24,maxWidth:1100,margin:"0 auto"}}>
        {tab==="stats"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>
              {[
                {label:"Total Revenue",val:`₹${totalRevenue.toFixed(0)}`,icon:"💰",color:"var(--green)"},
                {label:"Total Orders",val:orders.length,icon:"📦",color:"var(--blue)"},
                {label:"Products",val:products.length,icon:"🛒",color:"var(--amber)"},
                {label:"Customers",val:users.filter(u=>u.role!=="admin").length,icon:"👥",color:"#9b59b6"},
              ].map(s=>(
                <div key={s.label} className="card" style={{padding:20}}>
                  <p style={{fontSize:32}}>{s.icon}</p>
                  <p style={{fontSize:24,fontWeight:700,color:s.color,fontFamily:"var(--font-display)",marginTop:8}}>{s.val}</p>
                  <p style={{fontSize:13,color:"var(--gray-400)",marginTop:4}}>{s.label}</p>
                </div>
              ))}
            </div>
            <div className="card" style={{padding:20}}>
              <h3 style={{marginBottom:16,fontSize:16}}>Recent Orders</h3>
              {orders.length===0?<p style={{color:"var(--gray-400)",fontSize:14}}>No orders yet</p>:orders.slice(0,5).map(o=>(
                <div key={o.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--gray-100)",fontSize:14}}>
                  <span style={{fontWeight:600}}>#{o.id}</span>
                  <span>{o.user.name}</span>
                  <span style={{fontWeight:700,color:"var(--green)"}}>{fmtPrice(o.total)}</span>
                  <span className="badge badge-green">{o.status}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==="products"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:18}}>Products ({products.length})</h3>
              <button className="btn-primary" onClick={()=>{setEditingProduct(null);setNewProduct({name:"",category:CATEGORIES[1],price:"",unit:"",images:[],image:"🛒",stock:"",description:"",featured:false,offerPercent:"",offerLabel:"",features:[]});setFeatureInput("");setTab("add");}}>+ Add Product</button>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",background:"var(--white)",borderRadius:"var(--radius)",overflow:"hidden",border:"1px solid var(--gray-200)"}}>
                <thead>
                  <tr style={{background:"var(--gray-50)"}}>
                    {["","Name","Category","Price","Offer","Unit","Stock","Featured","Actions"].map(h=>(
                      <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:12,fontWeight:700,color:"var(--gray-600)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {products.map(p=>(
                    <tr key={p.id} style={{borderTop:"1px solid var(--gray-100)"}}>
                      <td style={{padding:"10px 14px",fontSize:20}}>
                        {p.imageUrl
                          ? <img src={p.imageUrl} alt={p.name} style={{width:40,height:40,objectFit:"cover",borderRadius:8,border:"1px solid var(--gray-200)"}}/>
                          : <span>{p.image}</span>
                        }
                      </td>
                      <td style={{padding:"10px 14px",fontWeight:600,fontSize:14}}>{p.name}</td>
                      <td style={{padding:"10px 14px"}}><span className="tag">{p.category}</span></td>
                      <td style={{padding:"10px 14px",fontWeight:700,color:"var(--green)"}}>₹{p.price}</td>
                      <td style={{padding:"10px 14px"}}>
                        {p.offerPercent
                          ? <span className="badge badge-red" style={{background:"var(--red-light)",color:"var(--red)"}}>{p.offerPercent}% OFF</span>
                          : <span style={{color:"var(--gray-400)",fontSize:13}}>—</span>
                        }
                      </td>
                      <td style={{padding:"10px 14px",fontSize:13,color:"var(--gray-600)"}}>{p.unit}</td>
                      <td style={{padding:"10px 14px"}}>
                        <span className={`badge ${p.stock<20?"badge-red":"badge-green"}`}>{p.stock}</span>
                      </td>
                      <td style={{padding:"10px 14px"}}>
                        <button onClick={()=>toggleFeatured(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18}}>{p.featured?"⭐":"☆"}</button>
                      </td>
                      <td style={{padding:"10px 14px"}}>
                        <div style={{display:"flex",gap:6}}>

                          <button className="btn-danger" onClick={()=>deleteProduct(p.id)} style={{fontSize:12,padding:"5px 10px"}}>Del</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
        {tab==="add"&&(

            <h3 style={{fontSize:18,marginBottom:20}}>{editingProduct?"Edit Product":"Add New Product"}</h3>
            <div className="card" style={{padding:24}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <MultiImageUploader
                  images={newProduct.images||[]}
                  onChange={imgs=>setNewProduct(prev=>({...prev,images:imgs}))}
                />
                {[["Product Name","name","text"],["Price (₹)","price","number"],["Unit","unit","text"],["Stock","stock","number"],["Description","description","text"]].map(([label,key,type])=>(
                  <div key={key} style={key==="name"||key==="description"?{gridColumn:"1/-1"}:{}}>
                    <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>{label}</label>

function DynamicMap({user}){
  // Build a query string from whatever address fields the user has
  const DEFAULT_QUERY="Chennai, Tamil Nadu, India";
  const DEFAULT_SRC="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d248849.84916360523!2d80.00902648809783!3d13.047358888128813!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a5265ea4f7d3361%3A0x6e61a70b6863d433!2sChennai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin";

  const [mapSrc,setMapSrc]=useState(DEFAULT_SRC);
  const [locationLabel,setLocationLabel]=useState(null);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!user){
      setMapSrc(DEFAULT_SRC);
      setLocationLabel(null);
      return;
    }
    // Build a meaningful query from user profile
    const parts=[];
    if(user.address) parts.push(user.address);
    if(user.city) parts.push(user.city);
    if(user.pincode) parts.push(user.pincode);
    parts.push("India");
    const query=parts.length>1?parts.join(", "):DEFAULT_QUERY;

    setLoading(true);
    // Use Google Maps Embed Search API — works without an API key
    const encoded=encodeURIComponent(query);
    const src=`https://maps.google.com/maps?q=${encoded}&output=embed&hl=en`;
    setMapSrc(src);
    setLocationLabel({name:user.name,query:parts.slice(0,-1).join(", ")||DEFAULT_QUERY});
    // Small delay so loading state is visible briefly
    const t=setTimeout(()=>setLoading(false),800);
    return()=>clearTimeout(t);
  },[user?.address,user?.city,user?.pincode,user?.id]);

  return(
    <div style={{width:"100%",maxWidth:280}}>
      {/* Label showing whose location is shown */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        {locationLabel?(
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13}}>📍</span>
            <div>
              <p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.9)",lineHeight:1.2}}>{locationLabel.name}'s Location</p>
              <p style={{fontSize:10,color:"rgba(255,255,255,.5)",lineHeight:1.2,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{locationLabel.query}</p>
            </div>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:13}}>📍</span>
            <p style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>FreshMart — Chennai</p>
          </div>
        )}
        {locationLabel&&(
          <span style={{background:"rgba(46,200,100,.25)",color:"#5ddb8e",borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>● LIVE</span>
        )}
      </div>

      {/* Map frame */}
      <div style={{borderRadius:"var(--radius)",overflow:"hidden",border:`1px solid ${locationLabel?"rgba(46,200,100,.4)":"rgba(255,255,255,.15)"}`,width:"100%",position:"relative",transition:"border-color .3s"}}>
        {loading&&(
          <div style={{position:"absolute",inset:0,background:"rgba(15,61,34,.85)",zIndex:2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
            <div style={{width:24,height:24,border:"3px solid rgba(255,255,255,.2)",borderTop:"3px solid #5ddb8e",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
            <p style={{fontSize:11,color:"rgba(255,255,255,.7)",fontWeight:600}}>Locating…</p>
          </div>
        )}
        <iframe
          key={mapSrc}
          title={locationLabel?`${locationLabel.name} delivery location`:"FreshMart Location"}
          src={mapSrc}
          width="100%" height="160" style={{border:0,display:"block"}} allowFullScreen loading="lazy"
          referrerPolicy="no-referrer-when-downgrade"/>
      </div>

      {/* Login nudge when not logged in */}
      {!user&&(
        <p style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:5,textAlign:"center"}}>Login to see your delivery location</p>
      )}
    </div>
  );
}

// ── BACKUP / RESTORE SYSTEM ───────────────────────────────────────────────────
const FM_STORAGE_KEYS=["fm_users","fm_orders","fm_products","fm_auto_backups"];

function saveAllData(users,orders,products){
  try{
    localStorage.setItem("fm_users",JSON.stringify(users));
    localStorage.setItem("fm_orders",JSON.stringify(orders));
    localStorage.setItem("fm_products",JSON.stringify(products));
  }catch(e){console.error("FreshMart save error",e);}
}

function createBackupObject(users,orders,products){
  return{
    version:"1.0",
    timestamp:new Date().toISOString(),
    label:new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
    users,orders,products
  };
}

function saveAutoBackup(users,orders,products){
  try{
    const existing=JSON.parse(localStorage.getItem("fm_auto_backups")||"[]");
    const newBackup=createBackupObject(users,orders,products);
    // Keep last 5 auto-backups
    const updated=[newBackup,...existing].slice(0,5);
    localStorage.setItem("fm_auto_backups",JSON.stringify(updated));
  }catch(e){console.error("Auto-backup error",e);}
}

function downloadBackup(users,orders,products){
  const backup=createBackupObject(users,orders,products);
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`freshmart_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function BackupRestoreModal({users,orders,products,onRestore,onClose,showToast}){
  const [tab,setTab]=useState("auto");
  const [autoBackups,setAutoBackups]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("fm_auto_backups")||"[]");}catch{return [];}
  });
  const [restoreError,setRestoreError]=useState("");
  const [confirmIdx,setConfirmIdx]=useState(null);
  const fileRef=useRef(null);

  function doRestore(backup){
    try{
      if(!backup.users||!Array.isArray(backup.users)) throw new Error("Invalid backup: missing users");
      onRestore(backup);
      setConfirmIdx(null);
      showToast("✅ Data restored successfully!");
      onClose();
    }catch(e){
      setRestoreError("Restore failed: "+e.message);
    }
  }

  function handleFileRestore(e){
    const file=e.target.files[0];
    if(!file){return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const backup=JSON.parse(ev.target.result);
        doRestore(backup);
      }catch(err){
        setRestoreError("Invalid backup file: "+err.message);
      }
    };
    reader.readAsText(file);
  }

  const statBadge=(label,count,color)=>(
    <span style={{background:color+"22",color,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700,marginRight:6}}>{count} {label}</span>
  );

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal fade-in" onClick={e=>e.stopPropagation()} style={{maxWidth:580,padding:0,overflow:"hidden"}}>
        {/* Header */}
        <div style={{background:"var(--green)",padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{color:"#fff",fontFamily:"var(--font-display)",fontSize:20,margin:0}}>💾 Backup & Restore</h2>
            <p style={{color:"rgba(255,255,255,.75)",fontSize:12,marginTop:2}}>Protect your data — users, orders, products</p>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"var(--radius-sm)",padding:"6px 12px",cursor:"pointer",fontSize:18,color:"#fff"}}>✕</button>
        </div>

        {/* Current snapshot */}
        <div style={{padding:"14px 24px",background:"var(--green-light)",borderBottom:"1px solid var(--gray-200)",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,color:"var(--green)",fontWeight:700,marginRight:4}}>📊 Current Data:</span>
          {statBadge("Users",users.length,"var(--blue)")}
          {statBadge("Orders",orders.length,"var(--amber)")}
          {statBadge("Products",products.length,"var(--green)")}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid var(--gray-200)"}}>
          {[{id:"auto",icon:"🔄",label:"Auto Backups"},{id:"manual",icon:"📥",label:"Manual Backup"},{id:"restore",icon:"📤",label:"Restore File"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 8px",border:"none",borderBottom:tab===t.id?"2.5px solid var(--green)":"2.5px solid transparent",background:"transparent",fontWeight:tab===t.id?700:400,color:tab===t.id?"var(--green)":"var(--gray-600)",fontSize:13,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span>{t.icon}</span><span>{t.label}</span>
            </button>
          ))}
        </div>

        <div style={{padding:"20px 24px",minHeight:220}}>
          {/* Auto Backups Tab */}
          {tab==="auto"&&(
            <div>
              <p style={{fontSize:13,color:"var(--gray-400)",marginBottom:14}}>Last 5 automatic backups. A new backup is created every time data changes.</p>
              {autoBackups.length===0?(
                <div style={{textAlign:"center",padding:"40px 0",color:"var(--gray-400)"}}>
                  <div style={{fontSize:40,marginBottom:8}}>📭</div>
                  <p>No auto backups yet. Data changes trigger automatic backups.</p>
                </div>
              ):autoBackups.map((b,i)=>(
                <div key={i} style={{background:"var(--gray-50)",borderRadius:"var(--radius-sm)",padding:"12px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid var(--gray-200)"}}>
                  <div>
                    <p style={{fontWeight:600,fontSize:13,color:"var(--gray-900)"}}>{i===0?"🟢 Latest — ":""}{b.label}</p>
                    <p style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>
                      {b.users?.length||0} users &bull; {b.orders?.length||0} orders &bull; {b.products?.length||0} products
                    </p>
                  </div>
                  {confirmIdx===i?(
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>doRestore(b)} style={{background:"var(--red)",color:"#fff",border:"none",borderRadius:"var(--radius-sm)",padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Confirm Restore</button>
                      <button onClick={()=>setConfirmIdx(null)} style={{background:"var(--gray-100)",border:"none",borderRadius:"var(--radius-sm)",padding:"6px 10px",fontSize:12,cursor:"pointer"}}>Cancel</button>
                    </div>
                  ):(
                    <button onClick={()=>setConfirmIdx(i)} className="btn-outline" style={{fontSize:12,padding:"6px 12px"}}>⏪ Restore</button>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Manual Backup Tab */}
          {tab==="manual"&&(
            <div style={{textAlign:"center",paddingTop:20}}>
              <div style={{fontSize:56,marginBottom:12}}>💾</div>
              <h3 style={{fontFamily:"var(--font-display)",fontSize:18,marginBottom:8}}>Download Backup File</h3>
              <p style={{color:"var(--gray-400)",fontSize:13,marginBottom:24,maxWidth:360,margin:"0 auto 24px"}}>Save a complete JSON backup of all users, orders, and products to your device.</p>
              <button className="btn-primary" onClick={()=>{downloadBackup(users,orders,products);showToast("✅ Backup downloaded!");}} style={{fontSize:15,padding:"12px 32px"}}>
                ⬇ Download Backup (.json)
              </button>
              <p style={{fontSize:11,color:"var(--gray-400)",marginTop:16}}>Keep this file safe. Use "Restore File" tab to recover it later.</p>
            </div>
          )}

          {/* Restore from File Tab */}
          {tab==="restore"&&(
            <div style={{textAlign:"center",paddingTop:20}}>
              <div style={{fontSize:56,marginBottom:12}}>📤</div>
              <h3 style={{fontFamily:"var(--font-display)",fontSize:18,marginBottom:8}}>Restore from File</h3>
              <p style={{color:"var(--gray-400)",fontSize:13,marginBottom:20,maxWidth:360,margin:"0 auto 20px"}}>Upload a previously downloaded FreshMart backup JSON file to restore all data.</p>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileRestore} style={{display:"none"}}/>
              <button className="btn-outline" onClick={()=>fileRef.current?.click()} style={{fontSize:15,padding:"12px 28px"}}>
                📁 Choose Backup File
              </button>
              {restoreError&&(
                <div style={{background:"var(--red-light)",border:"1px solid var(--red)",borderRadius:"var(--radius-sm)",padding:"10px 14px",marginTop:16,fontSize:13,color:"var(--red)"}}>
                  ⚠️ {restoreError}
                </div>
              )}
              <div style={{background:"var(--amber-light)",border:"1px solid var(--amber)",borderRadius:"var(--radius-sm)",padding:"10px 14px",marginTop:20,fontSize:12,color:"var(--amber)",textAlign:"left"}}>
                ⚠️ <strong>Warning:</strong> Restoring will replace all current data. This cannot be undone. Download a fresh backup first if needed.
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function InnerPage({pageKey,onBack}){
  const data=PAGE_CONTENT[pageKey];
  if(!data) return null;
  React.useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[pageKey]);
  return(
    <div style={{maxWidth:800,margin:"0 auto",padding:"40px 24px 80px"}}>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#1a6b3c",fontWeight:600,fontSize:14,cursor:"pointer",marginBottom:28,padding:0}}>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Shop
      </button>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:32,paddingBottom:20,borderBottom:"2px solid #e8f5ee"}}>
        <span style={{fontSize:36}}>{data.icon}</span>
        <h1 style={{fontSize:28,fontWeight:800,color:"#0f3d22",margin:0}}>{data.title}</h1>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:28}}>
        {data.sections.map((s,i)=>(
          <div key={i} style={{borderLeft:"3px solid #1a6b3c",paddingLeft:20}}>
            <h2 style={{fontSize:16,fontWeight:700,color:"#0f3d22",marginBottom:8,marginTop:0}}>{s.h}</h2>
            <p style={{fontSize:14,lineHeight:1.85,color:"#444",margin:0,whiteSpace:"pre-line"}}>{s.p}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [products,setProducts]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem("fm_products")||"null");
      return saved||INITIAL_PRODUCTS;
    }catch{return INITIAL_PRODUCTS;}
  });
  const [cart,setCart]=useState([]);
  const [user,setUser]=useState(null);
  const [orders,setOrders]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("fm_orders")||"[]");}catch{return [];}
  });
  const [backupModal,setBackupModal]=useState(false);
  const [users,setUsers]=useState(()=>{
    const saved=JSON.parse(localStorage.getItem("fm_users")||"[]");
    if(!saved.find(u=>u.role==="admin")){
      // Admin account: password hash of "admin123" — change this before production!
      const ADMIN_PASS_HASH="240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9";
      const admin={id:"ADMIN",name:"Admin",email:"admin@freshmart.com",passwordHash:ADMIN_PASS_HASH,role:"admin",phone:"9876543210",address:"FreshMart HQ",city:"Chennai",pincode:"600001"};
      saved.push(admin);
      localStorage.setItem("fm_users",JSON.stringify(saved));
    }
    return saved;
  });
  const [category,setCategory]=useState("All");
  const [search,setSearch]=useState("");
  const [cartOpen,setCartOpen]=useState(false);
  const [authModal,setAuthModal]=useState(null);
  const [checkoutOpen,setCheckoutOpen]=useState(false);
  const [lastOrder,setLastOrder]=useState(null);
  const [invoiceOrder,setInvoiceOrder]=useState(null);
  const [promo,setPromo]=useState(null);
  const [promoInput,setPromoInput]=useState("");
  const [adminOpen,setAdminOpen]=useState(false);
  const [backupOpen,setBackupOpen]=useState(false);
  const [selectedProduct,setSelectedProduct]=useState(null);
  const [toast,setToast]=useState(null);
  const [fabBounce,setFabBounce]=useState(false);
  const [activePage,setActivePage]=useState(null);
  const shopRef=useRef(null);
  const triggerFabBounce=()=>{setFabBounce(true);setTimeout(()=>setFabBounce(false),400);};

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  // ── AUTO-SAVE: persist orders & products to localStorage ──────────────────
  useEffect(()=>{
    localStorage.setItem("fm_orders",JSON.stringify(orders));
  },[orders]);

  useEffect(()=>{
    localStorage.setItem("fm_products",JSON.stringify(products));
  },[products]);

  useEffect(()=>{
    localStorage.setItem("fm_users",JSON.stringify(users));
  },[users]);

  // ── AUTO-BACKUP: triggered whenever core data changes ─────────────────────
  const backupTimerRef=useRef(null);
  useEffect(()=>{
    // Debounce: wait 2s after last change before saving backup
    clearTimeout(backupTimerRef.current);
    backupTimerRef.current=setTimeout(()=>{
      saveAutoBackup(users,orders,products);
    },2000);
    return()=>clearTimeout(backupTimerRef.current);
  },[users,orders,products]);

  function handleRestore(backup){
    if(backup.users){setUsers(backup.users);localStorage.setItem("fm_users",JSON.stringify(backup.users));}
    if(backup.orders){setOrders(backup.orders);}
    if(backup.products){setProducts(backup.products);}
    setUser(null); // log out current user for safety
  }

  const addToCart=p=>{
    setCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      return ex?c.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x):[...c,{...p,qty:1}];
    });
    showToast(`${p.image} ${p.name} added to cart`);
    triggerFabBounce();
  };
  const incCart=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty+1}:x));
  const decCart=id=>setCart(c=>c.map(x=>x.id===id&&x.qty>1?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));
  const remCart=id=>setCart(c=>c.filter(x=>x.id!==id));

  function handleAuth(u){
    setUser(u);setAuthModal(null);
    const updated=users.map(x=>x.id===u.id?u:x).concat(users.find(x=>x.id===u.id)?[]:[u]);
    setUsers(updated);
    localStorage.setItem("fm_users",JSON.stringify(updated));
    showToast(`Welcome, ${u.name}! 🎉`);
  }
  function handleLogout(){setUser(null);showToast("Logged out successfully");}

  function handlePlaceOrder(order){
    const newOrders=[order,...orders];
    setOrders(newOrders);
    const updated=users.map(u=>u.id===order.user.id?{...u,orders:[...( u.orders||[]),order.id]}:u);
    setUsers(updated);
    localStorage.setItem("fm_users",JSON.stringify(updated));
    setCart([]);setPromo(null);setPromoInput("");
    setCheckoutOpen(false);setCartOpen(false);
    setLastOrder(order);
    showToast("Order placed successfully! 🎉");
  }

  const filtered=products.filter(p=>{
    const matchCat=category==="All"||p.category===category;
    const matchSearch=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.category.toLowerCase().includes(search.toLowerCase());
    return matchCat&&matchSearch;
  });
  const featured=products.filter(p=>p.featured);

  return(
    <div>
      <Header user={user} cart={cart} onOpenCart={()=>setCartOpen(true)} onAuth={()=>setAuthModal("login")} onLogout={handleLogout} onAdmin={()=>setAdminOpen(true)} onBackup={()=>setBackupOpen(true)} search={search} setSearch={setSearch}/>
      <main id="main-content" role="main">
      {activePage ? <InnerPage pageKey={activePage} onBack={()=>setActivePage(null)}/> : <>
      <HeroBanner onShop={()=>shopRef.current?.scrollIntoView({behavior:"smooth"})}/>

      {!search&&featured.length>0&&(
        <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 20px 0"}}>
          <h2 style={{fontSize:20,marginBottom:16,fontFamily:"var(--font-display)"}}>⭐ Featured Products</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
            {featured.map(p=>(
              <ProductCard key={p.id} product={p} onAdd={()=>addToCart(p)} inCart={cart.some(c=>c.id===p.id)} qty={cart.find(c=>c.id===p.id)?.qty||0} onInc={()=>incCart(p.id)} onDec={()=>decCart(p.id)} onDetail={()=>setSelectedProduct(p)}/>
            ))}
          </div>
        </div>
      )}

      <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 20px"}} ref={shopRef}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontSize:20,fontFamily:"var(--font-display)"}}>
            {search?`Results for "${search}"`:"All Products"}
            <span style={{fontSize:14,fontWeight:400,color:"var(--gray-400)",marginLeft:8}}>({filtered.length} items)</span>
          </h2>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {CATEGORIES.map(cat=>(
            <button key={cat} onClick={()=>setCategory(cat)} style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${category===cat?"var(--green)":"var(--gray-200)"}`,background:category===cat?"var(--green)":"var(--white)",color:category===cat?"#fff":"var(--gray-600)",fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",transition:".2s"}}>
              {cat}
            </button>
          ))}
        </div>
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:"var(--gray-400)"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <p style={{fontSize:16,fontWeight:600}}>No products found</p>
            <p style={{fontSize:14,marginTop:4}}>Try a different search or category</p>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:16}}>
            {filtered.map(p=>(
              <ProductCard key={p.id} product={p} onAdd={()=>addToCart(p)} inCart={cart.some(c=>c.id===p.id)} qty={cart.find(c=>c.id===p.id)?.qty||0} onInc={()=>incCart(p.id)} onDec={()=>decCart(p.id)} onDetail={()=>setSelectedProduct(p)}/>
            ))}
          </div>
        )}
      </div>

      </>
      }
      </main>
      <footer style={{background:"#0f3d22",color:"rgba(255,255,255,.75)",marginTop:40}}>
        {/* Quick Cart Nav Bar */}

          <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",gap:12,justifyContent:"space-between",flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>🛒</span>
              <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>Quick Cart</span>
              <span style={{fontSize:12,color:"rgba(255,255,255,.5)"}}>— tap any item to add</span>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {products.filter(p=>p.featured).slice(0,6).map(p=>(
                <button key={p.id} onClick={()=>addToCart(p)} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:20,padding:"5px 12px",color:"rgba(255,255,255,.85)",cursor:"pointer",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:5,transition:".15s"}}

                {label:"Facebook", color:"#1877F2", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>},
                {label:"Instagram", color:"#E1306C", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>},
                {label:"YouTube", color:"#FF0000", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>}
              ].map(s=>(
                <button key={s.label} title={s.label} style={{width:38,height:38,borderRadius:"var(--radius-sm)",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.12)",color:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",transition:".2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=s.color;e.currentTarget.style.borderColor=s.color;}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.1)";e.currentTarget.style.borderColor="rgba(255,255,255,.12)";}}>
                  {s.svg}
                </button>
              ))}
            </div>
            {/* Dynamic Map */}
            <DynamicMap user={user}/>
          </div>

          {/* Quick Links */}
          <div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,letterSpacing:.5,marginBottom:18,textTransform:"uppercase"}}>Quick Links</h4>
            <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:10}}>
              {[
                {label:"About Us",          page:"about"},
                {label:"Careers",           page:"careers"},
                {label:"Press",             page:"press"},
                {label:"Blog",              page:"blog"},
                {label:"Affiliate Program", page:"affiliates"},
              ].map(l=>(
                <li key={l.label}><a href="#" onClick={e=>{e.preventDefault();setActivePage(l.page);window.scrollTo({top:0,behavior:"smooth"});}} style={{color:"rgba(255,255,255,.65)",fontSize:13,textDecoration:"none",transition:".15s"}}
                  onMouseEnter={e=>e.target.style.color="#fff"}
                  onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.65)"}>{l.label}</a></li>
              ))}
            </ul>
          </div>

          {/* Customer Care */}
          <div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,letterSpacing:.5,marginBottom:18,textTransform:"uppercase"}}>Customer Care</h4>
            <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:10}}>
              {[
                {label:"Help Center",   page:"help"},
                {label:"Track Order",   page:"track-order"},
                {label:"Returns",       page:"returns"},
                {label:"Delivery Info", page:"delivery-info"},
                {label:"Contact Us",    page:"contact"},
              ].map(l=>(
                <li key={l.label}><a href="#" onClick={e=>{e.preventDefault();setActivePage(l.page);window.scrollTo({top:0,behavior:"smooth"});}} style={{color:"rgba(255,255,255,.65)",fontSize:13,textDecoration:"none",transition:".15s"}}
                  onMouseEnter={e=>e.target.style.color="#fff"}
                  onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.65)"}>{l.label}</a></li>
              ))}
            </ul>
          </div>

          {/* Policies */}
          <div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,letterSpacing:.5,marginBottom:18,textTransform:"uppercase"}}>Policies</h4>
            <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:10}}>
              {[
                {label:"Privacy Policy", page:"privacy-policy"},
                {label:"Terms of Use",   page:"terms-of-use"},
                {label:"Cookie Policy",  page:"cookie-policy"},
                {label:"Refund Policy",  page:"refund-policy"},
                {label:"Sitemap",        page:"sitemap"},
              ].map(l=>(
                <li key={l.label}><a href="#" onClick={e=>{e.preventDefault();setActivePage(l.page);window.scrollTo({top:0,behavior:"smooth"});}} style={{color:"rgba(255,255,255,.65)",fontSize:13,textDecoration:"none",transition:".15s"}}
                  onMouseEnter={e=>e.target.style.color="#fff"}
                  onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.65)"}>{l.label}</a></li>
              ))}
            </ul>
          </div>
        </div>

        {/* Bottom bar */}
        <div style={{borderTop:"1px solid rgba(255,255,255,.1)",padding:"16px 24px"}}>
          <div style={{maxWidth:1200,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <p style={{fontSize:12,color:"rgba(255,255,255,.45)"}}>© 2026 FreshMart. All rights reserved.</p>
            {/* Footer Cart Icon Button */}
            <button
              className="footer-cart-btn"
              onClick={()=>setCartOpen(true)}
              aria-label={`View cart – ${cart.reduce((s,i)=>s+i.qty,0)} items`}
            >
              <span style={{fontSize:18}}>🛒</span>
              <span style={{fontSize:13}}>View Cart</span>
              {cart.reduce((s,i)=>s+i.qty,0)>0&&(
                <span className="fc-badge">{cart.reduce((s,i)=>s+i.qty,0)}</span>
              )}
              {cart.length>0&&(
                <span style={{fontSize:12,color:"var(--amber)",fontWeight:700,marginLeft:2}}>₹{cart.reduce((s,i)=>s+i.price*i.qty,0)}</span>
              )}
            </button>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {[
                {label:"Card", color:"#f59e0b", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>},
                {label:"Store", color:"#34d399", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
                {label:"UPI / Mobile", color:"#60a5fa", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>},
                {label:"Cash", color:"#fbbf24", svg:<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>}
              ].map((ic,i)=>(
                <span key={i} title={ic.label} style={{width:36,height:28,background:"rgba(255,255,255,.10)",border:"1px solid rgba(255,255,255,.12)",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",color:ic.color}}>{ic.svg}</span>
              ))}
            </div>
            <p style={{fontSize:12,color:"rgba(255,255,255,.45)"}}>Powered by love &amp; fresh produce 🌿</p>
          </div>
        </div>
      </footer>

      {/* Sticky Cart FAB – shown when cart has items */}
      {cart.length>0&&(
        <button
          className={`cart-fab${fabBounce?" bounce":""}`}
          onClick={()=>setCartOpen(true)}
          aria-label={`Open cart, ${cart.reduce((s,i)=>s+i.qty,0)} items`}
        >
          <span className="fab-icon">🛒</span>
          <span>My Cart</span>
          <span className="fab-badge">{cart.reduce((s,i)=>s+i.qty,0)}</span>
          <span style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,.82)",marginLeft:2}}>· ₹{cart.reduce((s,i)=>s+i.price*i.qty,0)}</span>
        </button>
      )}

      {cartOpen&&<CartSidebar cart={cart} onInc={incCart} onDec={decCart} onRemove={remCart} onCheckout={()=>{if(cart.length===0){showToast("Your cart is empty!");return;}setCartOpen(false);setCheckoutOpen(true);}} onClose={()=>setCartOpen(false)} promo={promo} setPromo={setPromo} promoInput={promoInput} setPromoInput={setPromoInput} user={user} onLogin={()=>{setCartOpen(false);setAuthModal("login");}}/>}
      {authModal&&<AuthModal mode={authModal} onAuth={handleAuth} onClose={()=>setAuthModal(null)} onSwitch={()=>setAuthModal(authModal==="login"?"register":"login")}/>}
      {checkoutOpen&&user&&<CheckoutModal cart={cart} user={user} promo={promo} promoInput={promoInput} onClose={()=>setCheckoutOpen(false)} onPlaceOrder={handlePlaceOrder} onUpdateUser={updated=>{const next=users.map(u=>u.id===updated.id?updated:u);setUsers(next);setUser(updated);localStorage.setItem("fm_users",JSON.stringify(next));}}/>}
      {lastOrder&&!invoiceOrder&&<OrderSuccess order={lastOrder} onViewInvoice={()=>{setInvoiceOrder(lastOrder);setLastOrder(null);}} onClose={()=>setLastOrder(null)}/>}
      {invoiceOrder&&<InvoiceView order={invoiceOrder} onClose={()=>setInvoiceOrder(null)}/>}
      {adminOpen&&<AdminPanel products={products} setProducts={setProducts} orders={orders} setOrders={setOrders} users={users} setUsers={u=>{setUsers(u);localStorage.setItem("fm_users",JSON.stringify(u));}} onClose={()=>setAdminOpen(false)}/>
      }{selectedProduct&&<ProductDetailModal product={selectedProduct} onClose={()=>setSelectedProduct(null)} onAdd={()=>{addToCart(selectedProduct);}} inCart={cart.some(c=>c.id===selectedProduct.id)} qty={cart.find(c=>c.id===selectedProduct.id)?.qty||0} onInc={()=>incCart(selectedProduct.id)} onDec={()=>decCart(selectedProduct.id)}/>}
      {backupOpen&&<BackupRestoreModal users={users} orders={orders} products={products} onRestore={handleRestore} onClose={()=>setBackupOpen(false)} showToast={showToast}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
